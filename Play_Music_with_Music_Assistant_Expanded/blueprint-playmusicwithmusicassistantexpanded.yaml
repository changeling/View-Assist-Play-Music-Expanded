# =============================================================================
# View Assist - Play Music with Music Assistant (Expanded)
# Version: 0.2.0
# Date:    2026-06-22
# Based on: dinki's "Play Music with Music Assistant" v1.2.7
# Changelog: see CHANGELOG.md
# Status: beta (0.x) - commands and behavior may change before 1.0.0
# =============================================================================
blueprint:
  name: View Assist - Play Music with Music Assistant Expanded
  description:
    Voice control for Music Assistant from a View Assist satellite - play music,
    control playback, manage the queue, move audio between rooms, make
    announcements, and more. Expanded edition v0.2.0, based on Play Music with
    Music Assistant v1.2.7. See CHANGELOG.md for the full list of changes.
  domain: automation
  input:
    ma_instance:
      name: Music Assistant Instance
      description: Select the Music Assistant instance
      selector:
        config_entry:
          integration: music_assistant
    view_path:
      name: Dashboard Info view
      description:
        The View Assist dashboard view to use for displaying music information
        (example /view-assist/music)
      default: /view-assist/music
    language:
      name: Language
      description: The desired spoken language
      default: en
      selector:
        language:
          languages:
            - ca
            - de
            - en
            - es
            - nl
            - pl
            - pt
            - ro
          no_sort: false
          native_name: false
    play_artist_command:
      name: Play Artist Command
      description: The command to trigger the play artist action
      default:
        (play the artist {artist} | play some {artist} [music] |play [some]
        [music | songs] by {artist})
    play_playlist_command:
      name: Play Playlist Command
      description: The command to trigger the play playlist action
      # >>>>> MODIFIED: added "play" as an alternative verb to "start" >>>>>
      default: (start | play) [the] {playlist} playlist
      # <<<<< MODIFIED END <<<<<
    play_song_command:
      name: Play Song Command
      description: The command to trigger the play song action
      default: play {song} by {artist}
    queue_song_command:
      name: Queue Song Command
      description: The command to trigger the queue song action
      default: (queue | cue | Q) {song} by {artist}
    # >>>>> NEW CODE BEGIN (Tier 2 play_media inputs) >>>>>
    play_album_command:
      name: Play Album Command
      description: The command to play an album, optionally by a named artist
      default: (play [the] album {album} by {artist} | play [the] album {album})
    play_radio_command:
      name: Play Radio Station Command
      description: The command to play a radio station by name
      default: (play [the] radio station {radio} | start [the] radio station {radio} | play {radio} (radio | station))
    station_aliases:
      name: Radio Station Aliases
      description:
        Optional list mapping spoken station phrases to a Music Assistant radio
        media id, for stations that search does not resolve reliably. Spoken
        phrase is what you say; Media id is the exact station to play; Station
        name is an optional friendly name for the spoken reply. Aliases match
        case-insensitively and take priority; any spoken station not listed
        falls back to a normal search. Leave empty to rely on search only.
      default: []
      selector:
        object:
          label_field: alias
          multiple: true
          fields:
            alias:
              label: Spoken phrase
              required: true
              selector:
                text:
            media_id:
              label: Media id
              required: true
              selector:
                text:
            station_name:
              label: Station name (optional)
              required: false
              selector:
                text:
    radio_mode_command:
      name: Radio Mode Command
      description:
        The command to start radio mode seeded from an artist. Music Assistant
        builds a continuous mix based on the artist.
      default: (play | start) [a] radio [mode] (based on | for | from) {artist}
    add_song_command:
      name: Add Song To Queue Command
      description:
        The command to add a song to the end of the queue. Distinct from the
        Queue Song command, which inserts the song to play next.
      default: (add | append) {song} by {artist} [to [the] [end of [the]] queue]
    # <<<<< NEW CODE END (Tier 2 play_media inputs) <<<<<
    # >>>>> NEW CODE BEGIN (Tier 2 transfer_queue inputs) >>>>>
    transfer_target_command:
      name: Transfer To Target Command
      description:
        Move the currently playing music to a named room/player. {target} is
        resolved against the Join Alias Map first, then against Music Assistant
        player friendly names.
      default: (move | transfer | send) [the] (music | queue | playback | song) to [the] {target} [(speaker | device | room)]
    transfer_here_command:
      name: Transfer Here Command
      description:
        Move the currently playing music to this satellite's player. No spoken
        room name required.
      default: (move | transfer | send | bring) [the] (music | queue | playback | song) (here | to this (room | speaker | device)) [too]
    # <<<<< NEW CODE END (Tier 2 transfer_queue inputs) <<<<<
    # >>>>> NEW CODE BEGIN (Tier 2 favorite + now playing inputs) >>>>>
    favorite_song_command:
      name: Favorite Current Song Command
      description:
        Favorite the song currently playing on this satellite's player. The
        favorite button entity is resolved dynamically from the player's
        device, so nothing needs to be configured.
      default: (favorite | favourite | like) [this] (song | track)
    now_playing_command:
      name: Now Playing Command
      description:
        Say what is currently playing, read from the active player. Checks this
        satellite's player first and otherwise the first player found playing.
      default: (what's | what is) playing [now | right now]
    # <<<<< NEW CODE END (Tier 2 favorite + now playing inputs) <<<<<
    # >>>>> NEW CODE BEGIN (Tier 2 announcement inputs) >>>>>
    announcement_command:
      name: Announce (TTS) Command
      description:
        Speak an announcement out loud. The text you say is spoken back through
        the satellite's own voice pipeline, so no TTS engine needs configuring.
      default: (announce | say | broadcast) {message}
    announcement_url_command:
      name: Announce Sound (URL) Command
      description:
        Play a named pre-recorded announcement sound. The spoken name is looked
        up in the Announcement Sound Map below. Optional; does nothing until
        that map has entries.
      default: play [the] {name} (announcement | sound | chime)
    announcement_url_map:
      name: Announcement Sound Map
      description:
        Optional list mapping spoken names to announcement sound URLs, used by
        the Announce Sound command. Add one entry per spoken name; each needs a
        URL to an audio file. Names match case-insensitively. Leave empty if you
        only use spoken announcements.
      default: []
      selector:
        object:
          label_field: alias
          multiple: true
          fields:
            alias:
              label: Spoken name
              required: true
              selector:
                text:
            url:
              label: Sound URL
              required: true
              selector:
                text:
    # <<<<< NEW CODE END (Tier 2 announcement inputs) <<<<<
    # >>>>> NEW CODE BEGIN (Tier 2 get_library + queue lookahead inputs) >>>>>
    play_random_command:
      name: Play Random Music Command
      description: Queue a set of random tracks from the library and play them.
      default: (play | start) [some] random (music | songs | tracks)
    whats_next_command:
      name: What's Next Command
      description: Say the next few upcoming tracks in the queue.
      default: ((what's | what is) (next | coming up) | (what's | what is) in the queue)
    random_count:
      name: Random Track Count
      description: How many tracks to queue for the play random music command.
      default: 25
      selector:
        number:
          min: 1
          max: 100
          mode: box
    # <<<<< NEW CODE END (Tier 2 get_library + queue lookahead inputs) <<<<<
    # >>>>> NEW CODE BEGIN (Tier 3 inputs) >>>>>
    shuffle_on_command:
      name: Shuffle On Command
      description: The command to turn shuffle on
      default: (shuffle on | turn on shuffle | enable shuffle | shuffle [my] [music | songs])
    shuffle_off_command:
      name: Shuffle Off Command
      description: The command to turn shuffle off
      default: (shuffle off | turn off shuffle | disable shuffle | stop shuffling)
    repeat_off_command:
      name: Repeat Off Command
      description: The command to turn repeat off
      default: (repeat off | turn off repeat | disable repeat | stop repeating)
    repeat_one_command:
      name: Repeat One Command
      description: The command to repeat the current track
      default: (repeat (this | the) (song | track) | repeat one)
    repeat_all_command:
      name: Repeat All Command
      description: The command to repeat the whole queue
      default: (repeat all | repeat (the) (queue | playlist) | repeat everything)
    clear_queue_command:
      name: Clear Queue Command
      description: The command to clear the playback queue
      default: (clear | empty) [the] queue
    stop_command:
      name: Stop Command
      description: The command to stop playback
      default: (stop [the] (music | playback) | stop playing)
    select_source_command:
      name: Select Source Command
      description:
        The command to change the player's source. The spoken source must
        match a source the player exposes, so this is the most fragile of the
        controls and may need per-player tuning.
      default: (set | change | switch) [the] source to {source}
    join_target_command:
      name: Join Target Command
      description:
        Add a named room/player to the music that is currently playing.
        {target} is resolved against the Join Alias Map first, then against
        Music Assistant player friendly names.
      default: (join | add | group | sync) [the] {target} [(speaker | device | room)] [to [the] (group | music)]
    join_here_command:
      name: Play Here Too Command
      description:
        Add this satellite's player to whatever is currently playing. No
        spoken room name required. Avoids the verbs join/add/group/sync so it
        cannot collide with the named command above.
      default: (play here too | also play here | play [the] music here [too] | play here as well)
    unjoin_command:
      name: Unjoin Command
      description: Remove this satellite's player from its current group
      default: (unjoin | leave [the] group | ungroup [this] [(room | speaker | device)] | stop joining)
    join_alias_map:
      name: Join Alias Map
      description:
        Optional list mapping spoken room phrases to Music Assistant player
        entity_ids, used to resolve the named Join and Transfer commands
        reliably. Add one entry per spoken phrase; multiple aliases may point
        to the same player. Aliases match case-insensitively; anything not
        listed falls back to friendly-name matching. Leave empty to rely on
        friendly names only.
      default: []
      selector:
        object:
          label_field: alias
          multiple: true
          fields:
            alias:
              label: Spoken phrase
              required: true
              selector:
                text:
            player:
              label: Player entity_id
              required: true
              selector:
                text:
    # <<<<< NEW CODE END (Tier 3 inputs) <<<<<
alias: View Assist - Play Music with Music Assistant Expanded
description: Play music using music assistant
trigger:
  - trigger: conversation
    command: !input play_artist_command
    id: playartist
  - trigger: conversation
    command: !input play_playlist_command
    id: playlist
  - trigger: conversation
    command: !input play_song_command
    id: playsong
  - trigger: conversation
    command: !input queue_song_command
    id: cuesong
  # >>>>> NEW CODE BEGIN (Tier 2 play_media triggers) >>>>>
  - trigger: conversation
    command: !input play_album_command
    id: playalbum
  - trigger: conversation
    command: !input play_radio_command
    id: playradio
  - trigger: conversation
    command: !input radio_mode_command
    id: radiomode
  - trigger: conversation
    command: !input add_song_command
    id: addsong
  # <<<<< NEW CODE END (Tier 2 play_media triggers) <<<<<
  # >>>>> NEW CODE BEGIN (Tier 2 transfer_queue triggers) >>>>>
  - trigger: conversation
    command: !input transfer_target_command
    id: transfertarget
  - trigger: conversation
    command: !input transfer_here_command
    id: transferhere
  # <<<<< NEW CODE END (Tier 2 transfer_queue triggers) <<<<<
  # >>>>> NEW CODE BEGIN (Tier 2 favorite + now playing triggers) >>>>>
  - trigger: conversation
    command: !input favorite_song_command
    id: favoritesong
  - trigger: conversation
    command: !input now_playing_command
    id: nowplaying
  # <<<<< NEW CODE END (Tier 2 favorite + now playing triggers) <<<<<
  # >>>>> NEW CODE BEGIN (Tier 2 announcement triggers) >>>>>
  - trigger: conversation
    command: !input announcement_command
    id: announce
  - trigger: conversation
    command: !input announcement_url_command
    id: announceurl
  # <<<<< NEW CODE END (Tier 2 announcement triggers) <<<<<
  # >>>>> NEW CODE BEGIN (Tier 2 get_library + queue lookahead triggers) >>>>>
  - trigger: conversation
    command: !input play_random_command
    id: playrandom
  - trigger: conversation
    command: !input whats_next_command
    id: whatsnext
  # <<<<< NEW CODE END (Tier 2 get_library + queue lookahead triggers) <<<<<
  # >>>>> NEW CODE BEGIN (Tier 3 triggers) >>>>>
  - trigger: conversation
    command: !input shuffle_on_command
    id: shuffleon
  - trigger: conversation
    command: !input shuffle_off_command
    id: shuffleoff
  - trigger: conversation
    command: !input repeat_off_command
    id: repeatoff
  - trigger: conversation
    command: !input repeat_one_command
    id: repeatone
  - trigger: conversation
    command: !input repeat_all_command
    id: repeatall
  - trigger: conversation
    command: !input clear_queue_command
    id: clearqueue
  - trigger: conversation
    command: !input stop_command
    id: stopplayback
  - trigger: conversation
    command: !input select_source_command
    id: selectsource
  - trigger: conversation
    command: !input join_target_command
    id: jointarget
  - trigger: conversation
    command: !input join_here_command
    id: joinhere
  - trigger: conversation
    command: !input unjoin_command
    id: unjoin
  # <<<<< NEW CODE END (Tier 3 triggers) <<<<<
