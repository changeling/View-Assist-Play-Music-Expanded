        sequence:
          - variables:
              ma_leader: >-
                {% set ns = namespace(leader='') %}
                {% for e in integration_entities('music_assistant') if e.startswith('media_player.') %}
                  {% if ns.leader == '' and states(e) == 'playing' %}{% set ns.leader = e %}{% endif %}
                {% endfor %}
                {{ ns.leader }}
              ma_target: >-
                {% set query = (trigger.slots.target | default('')) | lower | trim %}
                {% set ns = namespace(match='') %}
                {% for item in join_alias_map if item is mapping %}
                  {% set item_alias = item.alias | default('') | string | lower | trim %}
                  {% if ns.match == '' and query != '' and item_alias == query %}{% set ns.match = item.player | default('') | string | trim %}{% endif %}
                {% endfor %}
                {% if ns.match == '' %}
                  {% for e in integration_entities('music_assistant') if e.startswith('media_player.') %}
                    {% set fn = state_attr(e, 'friendly_name') | default('') | lower %}
                    {% if ns.match == '' and query != '' and (query in fn or fn in query) %}{% set ns.match = e %}{% endif %}
                  {% endfor %}
                {% endif %}
                {{ ns.match }}
          - alias: Join only if music is playing and the named player resolved
            choose:
              - conditions:
                  - condition: template
                    value_template: "{{ ma_leader == '' }}"
                alias: Nothing is playing
                sequence:
                  - if:
                      - condition: template
                        value_template: "{{ target_use_announce is not false }}"
                    then:
                      - variables:
                          conversation_response: "{{ translations[language]['responses']['join_nothing_playing'] }}"
